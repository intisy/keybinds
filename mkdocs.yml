site_name: Keybindings Documentation
site_url: https://intisy.github.io/keybinds/
repo_url: https://github.com/intisy/keybinds
repo_name: intisy/keybinds

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Operating Systems:
      - Windows:
          - Shortcuts: windows.md
          - Window Managers:
              - GlazeWM: glazewm.md
      - macOS:
          - Shortcuts: macos.md
          - Window Managers:
              - Rectangle: rectangle.md
              - yabai: yabai.md
      - Linux:
          - Desktop Environments:
              - GNOME: gnome.md
              - KDE Plasma: kde.md
              - XFCE: xfce.md
          - Window Managers:
              - i3: i3.md
              - Sway: sway.md
              - Hyprland: hyprland.md
          - File Managers:
              - Nautilus: nautilus.md
              - Dolphin: dolphin.md
              - Thunar: thunar.md
  - Editors:
      - Terminal:
          - Vim: vim.md
          - Neovim: nvim.md
          - Emacs: emacs.md
          - Helix: helix.md
      - GUI:
          - VS Code: vscode.md
          - IntelliJ: intellij.md
          - Sublime Text: sublime.md
          - Zed: zed.md
  - Terminal:
      - Shells:
          - Bash / Readline: bash.md
          - PowerShell: powershell.md
      - Multiplexers:
          - tmux: tmux.md
      - File Managers:
          - ranger: ranger.md
      - CLI Tools:
          - Git: git.md
          - Docker: docker.md
  - Applications:
      - Browsers:
          - Chrome: chrome.md
          - Firefox: firefox.md
      - Productivity:
          - Obsidian: obsidian.md
      - Creative:
          - Blender: blender.md
